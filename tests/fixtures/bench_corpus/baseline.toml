# Retrieval Evaluation Harness — Baseline Thresholds
#
# Set conservatively: current metric minus 5% margin.
# Only recall@3 gates CI — recall@5, MRR, latency are informational.
# Fallback tag has no recall baseline — validated by reason assertion instead.
#
# Current metrics (2026-03-20, story 15.1 sub-declaration indexing):
#   global=0.853  keyword=0.833  file_hint=1.000  low_confidence=1.000
#   bugfix=1.000  refactor=1.000  impl=1.000  high_fanout=1.000
#   (keyword drop expected: child symbols now in FTS index compete with parent pivots)
#   (fallback excluded from recall — validated by reason assertion)
#
# Update after tuning: cargo test eval_retrieval_harness --lib -- --nocapture
# Then check target/bench_retrieval_results.json for actual metrics.

min_recall_at_3 = 0.70

[tag.keyword]
min_recall_at_3 = 0.78

[tag.file_hint]
min_recall_at_3 = 0.45

[tag.low_confidence]
min_recall_at_3 = 0.90

[tag.bugfix]
min_recall_at_3 = 0.65

[tag.refactor]
min_recall_at_3 = 0.65

[tag.impl]
min_recall_at_3 = 0.90

[tag.high_fanout]
min_recall_at_3 = 0.90
