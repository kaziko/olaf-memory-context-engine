# External Repository Benchmark Configuration
#
# Run with: cargo test --release benchmark_external -- --ignored
# Optional: BENCHMARK_REPO_DIR=/path/to/local/clone to skip network clone

[repo]
url = "https://github.com/kubernetes/kubernetes.git"
commit_sha = "040ca59611d5bb5976ad4cb47f1e80f8c877d0d8"
min_indexable_files = 2000

[thresholds]
budget = 4000
min_mean_savings_a_pct = 30.0
max_p95_warm_latency_ms = 2000
min_recall_hit_rate = 0.50

# ─── Query 1: Exact symbol (keyword) ────────────────────────────────────────

[[query]]
name = "keyword-exact-scheduleone"
intent = "ScheduleOne function in the Kubernetes scheduler"
tool = "get_brief"
tag = "keyword"
expected_pivots = ["pkg/scheduler/schedule_one.go::Scheduler::ScheduleOne"]
selection_rationale = "Entry point of the scheduler main loop; unique function name with 12+ internal callers across scheduling framework"

[[query.baseline_steps]]
action = "grep"
description = "find files referencing ScheduleOne"
estimated_output_tokens = 80

[[query.baseline_steps]]
action = "read"
file = "pkg/scheduler/schedule_one.go"
tokens = 13322

# ─── Query 2: Module-level (keyword) ────────────────────────────────────────

[[query]]
name = "keyword-module-garbage-collector"
intent = "garbage collector module in controller manager"
tool = "get_brief"
tag = "keyword"
expected_pivots = [
    "pkg/controller/garbagecollector/garbagecollector.go::NewGarbageCollector",
    "pkg/controller/garbagecollector/garbagecollector.go::GarbageCollector::attemptToDeleteItem",
]
selection_rationale = "Self-contained controller module with constructor and core deletion path spanning multiple internal methods"

[[query.baseline_steps]]
action = "grep"
description = "find GarbageCollector references in controller dir"
estimated_output_tokens = 200

[[query.baseline_steps]]
action = "read"
file = "pkg/controller/garbagecollector/garbagecollector.go"
tokens = 8121

# ─── Query 3: Cross-module trace (keyword) ──────────────────────────────────

[[query]]
name = "keyword-cross-module-reflector-informer"
intent = "how the Reflector feeds events into a shared informer in client-go"
tool = "get_brief"
tag = "keyword"
expected_pivots = [
    "staging/src/k8s.io/client-go/tools/cache/reflector.go::Reflector::ListAndWatch",
    "staging/src/k8s.io/client-go/tools/cache/controller.go::NewInformer",
]
selection_rationale = "Spans two files in same package but different conceptual roles (watch source vs consumer); classic cross-module trace"

[[query.baseline_steps]]
action = "grep"
description = "find ListAndWatch and NewInformer references in client-go cache"
estimated_output_tokens = 150

[[query.baseline_steps]]
action = "read"
file = "staging/src/k8s.io/client-go/tools/cache/reflector.go"
tokens = 13733

[[query.baseline_steps]]
action = "read"
file = "staging/src/k8s.io/client-go/tools/cache/controller.go"
tokens = 7628

