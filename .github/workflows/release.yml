name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # required for crates.io trusted publishing (OIDC)

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            asset_name: olaf-aarch64-apple-darwin
          - runner: macos-13
            target: x86_64-apple-darwin
            asset_name: olaf-x86_64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: olaf-x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            asset_name: olaf-aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl target (Linux only)
        if: contains(matrix.target, 'musl')
        run: rustup target add ${{ matrix.target }}
      - name: Build
        env:
          RUSTFLAGS: ${{ contains(matrix.target, 'musl') && '-C target-feature=+crt-static' || '' }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        run: cp target/${{ matrix.target }}/release/olaf ${{ matrix.asset_name }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build  # all 4 platform builds must succeed first
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Publishing uses CARGO_REGISTRY_TOKEN secret by default.
      # To upgrade to OIDC trusted publishing (no long-lived secret):
      #   1. crates.io dashboard → Settings → Trusted Publishing → add kaziko/olaf-memory-context-engine + release.yml
      #   2. Remove the CARGO_REGISTRY_TOKEN env block below; cargo will use the OIDC token from id-token: write above.
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish  # publish must succeed before we create the public release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release and attach binaries
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
