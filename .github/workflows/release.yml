name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0) — must already exist in the repository'
        required: true
      skip_publish:
        description: 'Skip crates.io publish (use when version is already published)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write  # required for crates.io trusted publishing (OIDC)

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            asset_name: olaf-aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin
            asset_name: olaf-x86_64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: olaf-x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            asset_name: olaf-aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl tools (Linux musl targets only)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update -qq && sudo apt-get install -y musl-tools
          rustup target add ${{ matrix.target }}
      - name: Build
        env:
          RUSTFLAGS: ${{ contains(matrix.target, 'musl') && '-C target-feature=+crt-static' || '' }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        run: cp target/${{ matrix.target }}/release/olaf ${{ matrix.asset_name }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build  # all 4 platform builds must succeed first
    if: github.event.inputs.skip_publish != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      # Publishing uses CARGO_REGISTRY_TOKEN secret by default.
      # To upgrade to OIDC trusted publishing (no long-lived secret):
      #   1. crates.io dashboard → Settings → Trusted Publishing → add kaziko/olaf-memory-context-engine + release.yml
      #   2. Remove the CARGO_REGISTRY_TOKEN env block below; cargo will use the OIDC token from id-token: write above.
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish]
    # On push (tag): both build and publish must succeed.
    # On workflow_dispatch with skip_publish=true: publish is skipped (result == 'skipped'),
    # so gate on build success only in that case.
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release and attach binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
