name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check
      - run: cargo test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-retrieval-results
          path: target/bench_retrieval_results.json
          if-no-files-found: ignore
      - run: cargo clippy -- -D warnings
